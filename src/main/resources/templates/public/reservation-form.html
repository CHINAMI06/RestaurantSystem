<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('ご予約')}"></head>

<body class="bg-light">
    
    <div th:replace="~{fragments/public-header :: publicHeader}"></div>

    <main class="section container">

        <div class="reservation-container">

            <h1 class="section-title">ご予約フォーム</h1>

            <form th:action="@{/reservation}" th:object="${reservation}" method="post">

                <div class="form-group">
                    <label>ご予約日時</label>
                    <input type="datetime-local" th:field="*{reservationDateTime}" />
                    <span class="error-message" th:if="${#fields.hasErrors('reservationDateTime')}" th:errors="*{reservationDateTime}"></span>
                </div>

                <div class="form-group">
                    <label>お名前</label>
                    <input type="text" th:field="*{name}" placeholder="山田 太郎" />
                    <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
        
                <div class="form-group">
                    <label>人数</label>
                    <input type="number" th:field="*{numberOfPeople}" min="1" />
                    <span class="error-message" th:if="${#fields.hasErrors('numberOfPeople')}" th:errors="*{numberOfPeople}"></span>
                </div>
        
                <div class="form-group">
                    <label>ご連絡先（メールアドレス）</label>
                    <input type="email" th:field="*{contact}" placeholder="example@mail.com" />
                    <span class="error-message" th:if="${#fields.hasErrors('contact')}" th:errors="*{contact}"></span>
                </div>
        
                <div class="submit-btn-container">
                    <button type="submit" class="btn btn-primary submit-btn">予約する</button>
                </div>        
            </form>

            <div class="back-link-container">
                <a th:href="@{/}" class="link-text">トップページに戻る</a>
            </div>
        </div>
    </main>
    
    <div th:replace="~{fragments/footer :: siteFooter}"></div>


</body>

</html>
