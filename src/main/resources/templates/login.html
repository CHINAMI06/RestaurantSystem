<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('ログイン | レストラン予約システム')}"></head>

<body class="bg-light">

<main class="section container">

    <h2 class="section-title">店舗管理ログイン</h2>

    <!-- ログインに失敗してURLに ?error が付いた時だけ、赤い警告文を表示する -->
    <div th:if="${param.error}" class="error-message">
        ユーザー名またはパスワードが正しくありません。
    </div>
    
    <!-- パスワードを扱うため、URLに情報が出ないPOSTメソッドを使う -->
    <form th:action="@{/login}" method="post" class="login-form">

        <div class="form-group">
            <label>ユーザー名: </label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>パスワード: </label>
            <input type="password" name="password" required>
        </div>

        <div class="submit-btn-container">
            <button type="submit" class="btn btn--primary btn--full-width">ログイン</button>
        </div>

    </form>

    <div class="back-link-container">
        <a th:href="@{/}" class="btn btn--tertiary">トップページへ戻る</a>
    </div>
    
</main>

<div th:replace="~{fragments/scripts :: commonScripts}"></div>

</body>
</html>
