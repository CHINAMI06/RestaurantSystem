<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('ユーザー一覧')}"></head>    

<body>

<div th:replace="~{fragments/admin-header :: adminHeader}"></div>

<main class="section container">

    <h1>ユーザー一覧</h1>

    <a th:href="@{/admin/users/add}" class="btn btn--primary">新規ユーザーを追加</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>ユーザー名</th>
                <th>ロール</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.username}"></td>
                <td th:text="${user.role}"></td>
                <td>
                    <div class="action-buttons">
                        <a th:href="@{/admin/users/edit/{id}(id=${user.id})}" class="btn btn--tertiary btn--small">編集</a>
                        <a th:href="@{/admin/users/delete/{id}(id=${user.id})}" class="btn btn--danger btn--small" onclick="return confirm('本当に削除しますか？');">削除</a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

</main>

<div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
<div th:replace="~{fragments/scripts :: commonScripts}"></div>

</body>

</html>
