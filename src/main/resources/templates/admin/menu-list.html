<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('メニュー一覧')}"></head>

<body>

<div th:replace="~{fragments/admin-header :: adminHeader}"></div>

<main class="section container">

    <h1>メニュー一覧</h1>

    <div th:if="${successMessage}" class="alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert-danger" th:text="${errorMessage}"></div>
    
    <table class="admin-table"> 
        <thead>
            <tr>
                <th>ID</th>
                <th>料理名</th>
                <th>価格</th>
                <th>操作</th>
            </tr>
        </thead>
        
        <tbody>
            <!-- メニューのリストをループして表示 -->
            <tr th:each="menu : ${menus}">
                <td th:text="${menu.id}"></td>
                <td th:text="${menu.name}"></td>
                <td th:text="${#numbers.formatInteger(menu.price, 0, 'COMMA')} + '円'"></td>
                <td>
                    <div class="action-buttons">

                        <a th:href="@{/admin/menu/edit/{id}(id=${menu.id})}" 
                           class="btn btn-third btn-small">編集
                        </a>
                    
                        <form th:action="@{/admin/menu/delete/{id}(id=${menu.id})}" 
                              method="post"
                              onsubmit="return confirm('本当に削除しますか？')">

                            <button type="submit" class="btn btn-third btn-small">
                                削除
                            </button>

                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="admin-actions">

        <a th:href="@{/admin/menu/add}" class="btn btn-third btn-small">
        新しいメニューを追加
        </a>

    </div>
    
</main>

<div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
<div th:replace="~{fragments/scripts :: commonScripts}"></div>

</body>

</html>
