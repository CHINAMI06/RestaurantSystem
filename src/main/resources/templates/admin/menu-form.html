<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('メニュー登録')}"></head>

<body>

<div th:replace="~{fragments/admin-header :: adminHeader}"></div>

<main class="section container">

    <h1>メニュー登録</h1>

    <!-- フォームの送信先は/admin/menu/add, メソッドはPOST -->
    <form th:action="@{/admin/menu/add}" th:object="${menu}" method="post" class="admin-form">

        <div class="form-group">
            <label>料理名: </label>
            <input type="text" th:field="*{name}" />
            <p class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        
        <div class="form-group">
            <label>価格: </label>
            <input type="number" th:field="*{price}" min="0" required/>
            <p class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
            <p class="error-message" th:if="${serviceError}" th:text="${serviceError}"></p>
        </div>

        <div class="admin-actions">
            <button type="submit" class="btn btn-primary">登録</button>
            <a th:href="@{/admin/menu}" class="btn btn-secondary">メニュー一覧に戻る</a>
        </div>

    </form>

</main>

<div th:replace="~{fragments/admin-footer :: adminFooter}"></div>
<div th:replace="~{fragments/scripts :: commonScripts}"></div>
    
</body>

</html>
