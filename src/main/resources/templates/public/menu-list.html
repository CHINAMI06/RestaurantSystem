<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: commonHead('メニュー一覧')}"></head>

<body class="bg-light">

    <div th:replace="~{fragments/public-header :: publicHeader}"></div>

    <main class="section container">

        <div class="menu-page__container">

            <h1 class="section-title">お品書き</h1>
    
            <table class="menu-table">
                <thead>
                    <tr>
                        <th class="menu-table__header-cell">料理名</th>
                        <th class="menu-table__header-cell">価格</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="menu : ${menus}">
                        <td class="menu-table__cell menu-table__cell--name" th:text="${menu.name}">料理名</td>
                        <td class="menu-table__cell menu-table__cell--price" th:text="${#numbers.formatInteger(menu.price, 0, 'COMMA')} + '円'">0円</td>
                    </tr>
                </tbody>
            </table>

            <div class="menu-page__back-link-container">
                <a th:href="@{/}" class="btn btn--tertiary">トップページに戻る</a>
            </div>
        </div>

        <!-- 店舗情報 -->
        <section id="info" class="section container">
            <h2 class="section-title">店舗情報</h2>
            <table class="info-table">
                <tr>
                    <th>店舗名</th>
                    <td>RESTAURANT</td>
                </tr>
                <tr>
                    <th>住所</th>
                    <td>東京都渋谷区1-2-3</td>
                </tr>
                <tr>
                    <th>電話番号</th>
                    <td>03-1234-5678</td>
                </tr>
                <tr>
                    <th>営業時間</th>
                    <td>11:00 - 22:00 (L.O. 21:30)</td>
                </tr>
                <tr>
                    <th>定休日</th>
                    <td>水曜日</td>
                </tr>
            </table>
        </section>
    
        <!-- アクセス -->
        <section id="access" class="section bg-light">
            <div class="container">
                <h2 class="section-title">アクセス</h2>
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3241.770164459432!2d139.69906087647968!3d35.65803387259473!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60188b582c15c3cf%3A0x8c0e68a8aa03fd5c!2z5riL6LC36aeF!5e0!3m2!1sja!2sjp!4v1772450736712!5m2!1sja!2sjp" 
                        width="100%" height="400" style="border:0;" 
                        allowfullscreen="" loading="lazy">
                    </iframe>
                    <p>JR渋谷駅から徒歩5分</p>
                    <p>東京メトロ渋谷駅から徒歩3分</p>
                    <p>駐車場あり（有料）</p>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: siteFooter}"></div>
    <div th:replace="~{fragments/scripts :: commonScripts}"></div>

</body>

</html>
